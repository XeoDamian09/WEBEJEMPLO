<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, inicial-scale=1.0">
        <title>FORMULARIO DE CONTACTO</title>
        <link rel="stylesheet" href="estilo-form.css">
    </head>
    <body>
        <div class="container">
           <form action="https://api.web3forms.com/submit" method="POST">
            <input type="hidden" name="access_key" value="cd53c601-377b-4520-b669-51ff1e293b2d">

                    <h2><i class="fa-solid fa-envelope">Contacto</i></h2>
                    <p class="subtitle">Ingresa tus datos correctamente y pronto te respondemos a tu correo electrónico</p>

                    <div class="input-group">
                        <label for="name"><i class="da-solid fa-user">Nombres:</i></label>
                        <input type="text" name="name" id="name" placeholder="Ingresa tus nombres">

                        <label for="phone"><i class="fa-solid fa-phone">Teléfono:</i></label>
                        <input type="tel" name="phone" id="phone" placeholder="Agrega tu número">

                        <label for="email"><i class="fa-solid fa-at">Correo:</i></label>
                        <input type="email" name="email" id="email" placeholder="Ingresa tu email" required>

                        <label for="message"><i class="fa-solid fa-coment-dots">Asunto:</i></label>
                        <textarea type="message" name="message" rows="4" placeholder="Como podemos ayudarte"></textarea>

                        <div class="form-links">
                            <a href="#">Política de Privacidad</a>
                            <a href="#">Términos y Condiciones</a>
                        </div>

                        <button type="submit" class="btn">
                            <span>Enviar mensaje</span>
                            <i class="fa-solid fa-paper-plane"></i>
                        </button>

                    </div>
            </form>
        </div>
    </body>
</html>
